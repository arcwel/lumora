{% if prompts %}
<div class="snapshot-list">
  {% for p in prompts %}
  <div class="snapshot-row fade-in">
    <div class="snapshot-info" style="flex:1; min-width:0;">
      <div class="snapshot-detail" style="min-width:0;">
        <p class="snap-title" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="{{ p.text }}">{{ p.text }}</p>
        <p class="snap-sub">{{ p.category or 'Uncategorized' }}</p>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:12px; flex-shrink:0;">
      {% if p.is_active %}
        <span class="badge badge-completed"><span class="badge-dot"></span>Active</span>
      {% else %}
        <span class="badge badge-pending"><span class="badge-dot"></span>Inactive</span>
      {% endif %}
      <button
        hx-post="/projects/{{ project_id }}/prompts/{{ p.id }}/toggle"
        hx-target="#prompt-list"
        hx-swap="innerHTML"
        class="btn btn-ghost btn-sm" style="padding:6px 12px; font-size:12px;">
        {{ 'Disable' if p.is_active else 'Enable' }}
      </button>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="empty-state" style="padding:32px 20px;">
  <p class="empty-desc" style="margin:0;">No prompts yet — add your first one above.</p>
</div>
{% endif %}
