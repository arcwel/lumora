<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Lumora{% endblock %}</title>

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
          },
          colors: {
            // Single restrained accent.
            accent: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            },
          },
          boxShadow: {
            card: '0 1px 2px 0 rgba(15, 23, 42, 0.04), 0 1px 3px 0 rgba(15, 23, 42, 0.06)',
            'card-hover': '0 4px 12px -2px rgba(15, 23, 42, 0.08), 0 2px 6px -2px rgba(15, 23, 42, 0.05)',
          },
        },
      },
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- HTMX + Chart.js -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- App JS (defines globals like promptTable) must run before Alpine inits. -->
  <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

  <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}" />
</head>

<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased">
  <div x-data="{ sidebarOpen: false }" class="min-h-full">

    <!-- Mobile backdrop -->
    <div x-show="sidebarOpen" x-transition.opacity
         @click="sidebarOpen = false"
         class="fixed inset-0 z-30 bg-slate-900/30 lg:hidden" style="display:none"></div>

    <!-- Sidebar -->
    <aside
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
      class="fixed inset-y-0 left-0 z-40 flex w-64 flex-col border-r border-slate-200 bg-white px-4 py-6 transition-transform duration-200 ease-out lg:translate-x-0">
      <a href="/" class="mb-8 flex items-center gap-2.5 px-2">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-accent-600 text-sm font-bold text-white">L</span>
        <span class="text-[15px] font-semibold tracking-tight">Lumora</span>
      </a>

      <nav class="flex-1 space-y-1">
        <a href="/" class="nav-link {{ 'nav-link-active' if nav == 'home' else '' }}">
          <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          Dashboard
        </a>
        {% block sidebar_extra %}{% endblock %}
      </nav>

      <div class="mt-auto px-2 pt-4">
        <p class="text-xs text-slate-400">AI visibility tracking</p>
      </div>
    </aside>

    <!-- Main column -->
    <div class="lg:pl-64">
      <!-- Mobile top bar -->
      <div class="sticky top-0 z-20 flex items-center gap-3 border-b border-slate-200 bg-white/80 px-4 py-3 backdrop-blur lg:hidden">
        <button @click="sidebarOpen = true" class="rounded-md p-1.5 text-slate-600 hover:bg-slate-100">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="text-sm font-semibold">Lumora</span>
      </div>

      <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-10 lg:py-10">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
